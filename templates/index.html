<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electronic Parts App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Electronic Parts Search App</h1>
    <p class="subtitle">Search electronic parts by keyword and category.</p>

    <form method="GET" class="search-form">
        <input
            type="text"
            name="keyword"
            placeholder="Search parts"
            value="{{ keyword }}"
        >

        <select name="category">
            <option value="">All Categories</option>
            {% for category in categories %}
                <option value="{{ category }}" {% if category == selected_category %}selected{% endif %}>
                    {{ category }}
                </option>
            {% endfor %}
        </select>

        <button type="submit">Search</button>
    </form>

    <p class="result-count">{{ parts|length }} result(s)</p>

    <div class="parts-list">
        {% for part in parts %}
            <div class="part-card">
                <h2>{{ part.name }}</h2>
                <p><strong>Category:</strong> {{ part.category }}</p>
                <p><strong>Price:</strong> ¥{{ part.price }}</p>
                <p><strong>Stock:</strong> {{ part.stock }}</p>
                <p>{{ part.description }}</p>
                <a href="{{ url_for('part_detail', part_id=part.id) }}" class="detail-link">View Details</a>
            </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
